version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  inventory-service:
    build: ./inventory-service
    ports:
      - "4001:4001"
    environment:
      JWT_SECRET: "your-secret-key-change-this-in-production"
    depends_on:
      - postgres
      - redis
      - rabbitmq

  order-service:
    build: ./order-service
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: "your-secret-key-change-this-in-production"
    depends_on:
      - inventory-service
